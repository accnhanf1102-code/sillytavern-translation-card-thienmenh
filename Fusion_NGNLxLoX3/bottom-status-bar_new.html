      };

      const normalizePresetAvatarName = (raw) => {
        const s = String(raw || '').trim().normalize('NFC')
          .replace(/^[\s"'“”‘’「」『』《》〈〉()（）【】\[\]]+|[\s"'“”‘’「」『』《》〈〉()（）【】\[\]]+$/g, '');
        if (!s) return '';

        for (const [name, config] of Object.entries(PRESET_AVATAR_CONFIG)) {
          if (!Array.isArray(config?.aliases)) continue;
          if (config.aliases.some(alias => String(alias || '').toLowerCase() === s.toLowerCase())) {
            return name;
          }
        }

        let bestMatch = '';
        let maxLen = 0;
        for (const [name, config] of Object.entries(PRESET_AVATAR_CONFIG)) {
          if (!Array.isArray(config?.aliases)) continue;
          for (const alias of config.aliases) {
            if (!alias || alias.length < 2) continue;
            if (s.includes(alias) && alias.length > maxLen) {
              bestMatch = name;
              maxLen = alias.length;
            }
          }
        }

        return bestMatch || s;
      };

      const getPresetAvatar = (rawName) => {
        const normalizedName = normalizePresetAvatarName(rawName);
        return PRESET_AVATAR_CONFIG[normalizedName]?.avatar || '';
      };

      // ==================== Hàm render ====================
      const amberMapDebugUrl = 'https://cdn.jsdelivr.net/gh/abcxyzeric/hoi-lang-sang-the@main/amber_sword_worldmap.html';
      let _amberMapEmbedSrcdoc = '';
      let _amberMapHydratedUrl = '';
      let _amberMapHydratingUrl = '';
      let _amberMapDirectUrl = '';
      let _defaultMapEmbedSrcdoc = '';
      let _defaultMapHydratedUrl = '';
      let _defaultMapHydratingUrl = '';
      let _defaultMapDirectUrl = '';

      const resolveAmberMapBaseUrl = () => {
        try {
          const fromQuery = new URL(window.location.href).searchParams.get('amberMapUrl');
          if (fromQuery) return fromQuery;
        } catch (error) {
          console.warn('[Thanh trạng thái dưới] Đọc tham số amberMapUrl thất bại:', error);
        }
        try {
          if (typeof window.AMBER_SWORD_MAP_EMBED_URL === 'string' && window.AMBER_SWORD_MAP_EMBED_URL.trim()) {
            return window.AMBER_SWORD_MAP_EMBED_URL.trim();
          }
        } catch (error) {
          console.warn('[Thanh trạng thái dưới] Đọc địa chỉ bản đồ Hổ Phách toàn cục thất bại:', error);
        }
        return amberMapDebugUrl;
      };

      const buildAmberMapEmbedUrl = (baseUrl) => {
        const rawUrl = String(baseUrl || '').trim();
        if (!rawUrl) return amberMapDebugUrl;
        try {
          const url = new URL(rawUrl, window.location.href);
          url.searchParams.set('mode', 'browse');
          url.searchParams.set('embed', '1');
          return url.toString();
        } catch (error) {
          console.warn('[Thanh trạng thái dưới] Tạo địa chỉ bản đồ Hổ Phách thất bại:', error);
          const hashIndex = rawUrl.indexOf('#');
          const beforeHash = hashIndex >= 0 ? rawUrl.slice(0, hashIndex) : rawUrl;
          const hashPart = hashIndex >= 0 ? rawUrl.slice(hashIndex) : '';
          const joiner = beforeHash.includes('?') ? '&' : '?';
          return `${beforeHash}${joiner}mode=browse&embed=1${hashPart}`;
        }
      };

      const injectBaseHrefIntoHtml = (html, pageUrl, bootstrapConfig = null) => {
        const text = String(html || '');
        if (!text.trim()) return '';
        try {
          const baseHref = new URL('./', pageUrl).href;
          const bootstrapMarkup = (bootstrapConfig && typeof bootstrapConfig === 'object')
            ? `${'<scr' + 'ipt>'}window.__AMBER_MAP_EMBED_CONFIG__=${JSON.stringify(bootstrapConfig).replace(/</g, '\\u003c')};${'</scr' + 'ipt>'}`
            : '';
          const injectParts = [`<base href="${baseHref}">`];
          if (bootstrapConfig && typeof bootstrapConfig === 'object') {
            injectParts.push(bootstrapMarkup);
          }
          const injectMarkup = injectParts.join('');
          if (/<base\b/i.test(text)) {
            if (!bootstrapMarkup) return text;
            if (/<head[^>]*>/i.test(text)) {
              return text.replace(/<head([^>]*)>/i, `<head$1>${bootstrapMarkup}`);
            }
            if (/<!doctype[^>]*>/i.test(text)) {
              return text.replace(/<!doctype[^>]*>/i, match => `${match}\n<head>${bootstrapMarkup}</head>`);
            }
            return `<head>${bootstrapMarkup}</head>${text}`;
          }
          if (/<head[^>]*>/i.test(text)) {
            return text.replace(/<head([^>]*)>/i, `<head$1>${injectMarkup}`);
          }
          if (/<!doctype[^>]*>/i.test(text)) {
            return text.replace(/<!doctype[^>]*>/i, match => `${match}\n<head>${injectMarkup}</head>`);
          }
          return `<head>${injectMarkup}</head>${text}`;
        } catch (error) {
          console.warn('[Thanh trạng thái dưới] Chèn base cho bản đồ Hổ Phách thất bại:', error);
          return text;
        }
      };

      const applyAmberMapFrameToDom = () => {
        const frame = document.getElementById('statusbar-world-map-frame');
        if (!frame) return;
        const worldviewMode = String(frame.dataset.worldviewMode || '').trim();
        if (worldviewMode !== 'amber') {
          if (worldviewMode === 'default' && _defaultMapEmbedSrcdoc) {
            if (frame.getAttribute('src') !== 'about:blank') frame.setAttribute('src', 'about:blank');
            if (frame.srcdoc !== _defaultMapEmbedSrcdoc) frame.srcdoc = _defaultMapEmbedSrcdoc;
            return;
          }
          if (frame.srcdoc) frame.srcdoc = '';
          const fallbackSrc = String(_defaultMapDirectUrl || frame.dataset.mapSrc || '').trim();
          if (fallbackSrc && frame.getAttribute('src') !== fallbackSrc) frame.setAttribute('src', fallbackSrc);
          return;
        }

        if (_amberMapEmbedSrcdoc) {
          if (frame.getAttribute('src') !== 'about:blank') frame.setAttribute('src', 'about:blank');
          if (frame.srcdoc !== _amberMapEmbedSrcdoc) frame.srcdoc = _amberMapEmbedSrcdoc;
          return;
        }

        if (frame.srcdoc) frame.srcdoc = '';
        const directSrc = String(_amberMapDirectUrl || frame.dataset.mapSrc || '').trim() || 'about:blank';
        if (frame.getAttribute('src') !== directSrc) frame.setAttribute('src', directSrc);
      };

      const hydrateAmberMapEmbed = async (url) => {
        const targetUrl = String(url || '').trim();
        _amberMapHydratingUrl = targetUrl;
        _amberMapHydratedUrl = '';
        _amberMapEmbedSrcdoc = '';
        _amberMapDirectUrl = '';
        applyAmberMapFrameToDom();

        if (!targetUrl || !/^https?:\/\//i.test(targetUrl)) {
          _amberMapHydratingUrl = '';
          return;
        }

        try {
          const response = await fetch(targetUrl, { method: 'GET', mode: 'cors', credentials: 'omit' });
          if (_amberMapHydratingUrl !== targetUrl) return;
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const contentType = String(response.headers.get('content-type') || '').toLowerCase();
          if (contentType.includes('text/html')) {
            _amberMapDirectUrl = targetUrl;
            _amberMapHydratedUrl = targetUrl;
            _amberMapHydratingUrl = '';
            applyAmberMapFrameToDom();
            return;
          }

          const text = await response.text();
          if (_amberMapHydratingUrl !== targetUrl) return;
          if (/(<!doctype\s+html|<html\b)/i.test(text)) {
            _amberMapEmbedSrcdoc = injectBaseHrefIntoHtml(text, targetUrl, {
              mode: 'browse',
              embed: '1'
            });
            _amberMapHydratedUrl = targetUrl;
            _amberMapHydratingUrl = '';
            applyAmberMapFrameToDom();
            return;
          }

          _amberMapDirectUrl = targetUrl;
          _amberMapHydratedUrl = targetUrl;
          _amberMapHydratingUrl = '';
          applyAmberMapFrameToDom();
        } catch (error) {
          if (_amberMapHydratingUrl !== targetUrl) return;
          console.warn('[Thanh trạng thái dưới] Tải trước bản đồ Hổ Phách thất bại, chuyển sang tải trực tiếp:', error);
          _amberMapDirectUrl = targetUrl;
          _amberMapHydratedUrl = targetUrl;
          _amberMapHydratingUrl = '';
          applyAmberMapFrameToDom();
        }
      };

      const ensureAmberMapEmbedReady = (url) => {
        const targetUrl = String(url || '').trim();
        if (!targetUrl) return;
        if (_amberMapHydratedUrl === targetUrl || _amberMapHydratingUrl === targetUrl) return;
        hydrateAmberMapEmbed(targetUrl);
      };

      const hydrateDefaultMapEmbed = async (url) => {
        const targetUrl = String(url || '').trim();
        _defaultMapHydratingUrl = targetUrl;
        _defaultMapHydratedUrl = '';
        _defaultMapEmbedSrcdoc = '';
        _defaultMapDirectUrl = '';
        applyAmberMapFrameToDom();

        if (!targetUrl || !/^https?:\/\//i.test(targetUrl)) {
          _defaultMapHydratingUrl = '';
          return;
        }

        try {
          const response = await fetch(targetUrl, { method: 'GET', mode: 'cors', credentials: 'omit' });
          if (_defaultMapHydratingUrl !== targetUrl) return;
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const text = await response.text();
          if (_defaultMapHydratingUrl !== targetUrl) return;

          if (/(<!doctype\s+html|<html\b)/i.test(text)) {
            _defaultMapEmbedSrcdoc = injectBaseHrefIntoHtml(text, targetUrl);
            _defaultMapHydratedUrl = targetUrl;
            _defaultMapHydratingUrl = '';
            applyAmberMapFrameToDom();
            return;
          }

          _defaultMapDirectUrl = targetUrl;
          _defaultMapHydratedUrl = targetUrl;
          _defaultMapHydratingUrl = '';
          applyAmberMapFrameToDom();
        } catch (error) {
          if (_defaultMapHydratingUrl !== targetUrl) return;
          console.warn('[Thanh trạng thái dưới] Tải trước bản đồ DNF thất bại, chuyển sang tải trực tiếp:', error);
          _defaultMapDirectUrl = targetUrl;
          _defaultMapHydratedUrl = targetUrl;
          _defaultMapHydratingUrl = '';
          applyAmberMapFrameToDom();
        }
      };

      const ensureDefaultMapEmbedReady = (url) => {
        const targetUrl = String(url || '').trim();
        if (!targetUrl) return;
        if (_defaultMapHydratedUrl === targetUrl || _defaultMapHydratingUrl === targetUrl) return;
        hydrateDefaultMapEmbed(targetUrl);
      };

      const normalizeWorldviewLabel = (value) =>
        String(value || '').trim().replace(/_/g, ' ').replace(/\s+/g, ' ').toLowerCase();

      const isAmberWorldviewLabel = (value) => {
        const normalized = normalizeWorldviewLabel(value);
        return normalized === 'thanh kiếm hổ phách' || normalized === 'kiếm hổ phách';
      };

      const resolveWorldviewMapSrc = (worldviewLabel) => {
        const worldview = String(worldviewLabel || '').trim();
        if (isAmberWorldviewLabel(worldview)) {
          return buildAmberMapEmbedUrl(resolveAmberMapBaseUrl());

        return 'https://cdn.jsdelivr.net/gh/abcxyzeric/hoi-lang-sang-the@main/map.html';

      const renderStatusBar = (data) => {
        const Nhân_vật = data.Nhân_vật || {};
        const Thông_tin_thế_giới = data.Thông_tin_thế_giới || {};
        const Cấu_hình_hệ_thống = data.Cấu_hình_hệ_thống || {};
        const Danh_sách_ràng_buộc = data.Danh_sách_ràng_buộc || {};
        const Danh_vọng = Nhân_vật.Danh_vọng || {};
        const Tin_đồn = data.Tin_đồn || {};
        const Người_ở_gần = data.Người_ở_gần || {};
        const Tài_sản_cốt_lõi = data.Tài_sản_cốt_lõi || {};
        const Vị_trí = Thông_tin_thế_giới.Vị_trí || {};
        const Hiệu_ứng_trạng_thái = Nhân_vật.Hiệu_ứng_trạng_thái || {};
        const Đạo_lộ = Nhân_vật.Đạo_lộ || {};
        const Cây_kỹ_năng = Nhân_vật.Cây_kỹ_năng || {};
        const Danh_sách_kỹ_năng = Cây_kỹ_năng.Danh_sách_kỹ_năng || {};
        const Đang_chiến_đấu = data?.Chiến_đấu?.Đang_chiến_đấu === true;
        const Thời_gian = Thông_tin_thế_giới.Thời_gian || '';
        const Niên_lịch = Thông_tin_thế_giới.Niên_lịch || '';
        const Thế_giới_quan = Cấu_hình_hệ_thống.Thế_giới_quan || '';
        const isSaoWorldview = Thế_giới_quan === 'Sword Art Online';
        const isAmberWorldview = isAmberWorldviewLabel(Thế_giới_quan);
        const mapIframeSrc = resolveWorldviewMapSrc(Thế_giới_quan);
        if (isAmberWorldview) {
          ensureAmberMapEmbedReady(mapIframeSrc);
        } else if (!isSaoWorldview) {
          ensureDefaultMapEmbedReady(mapIframeSrc);
        }
        const shouldUseAmberDirectSrc = isAmberWorldview
          && _amberMapHydratedUrl === mapIframeSrc
          && !_amberMapEmbedSrcdoc
          && _amberMapDirectUrl === mapIframeSrc;
        const shouldUseDefaultDirectSrc = !isAmberWorldview
          && !isSaoWorldview
          && _defaultMapHydratedUrl === mapIframeSrc
          && !_defaultMapEmbedSrcdoc
          && _defaultMapDirectUrl === mapIframeSrc;
        const renderedMapSrc = isAmberWorldview
          ? (shouldUseAmberDirectSrc ? mapIframeSrc : 'about:blank')
          : (shouldUseDefaultDirectSrc ? mapIframeSrc : 'about:blank');
        const timeDisplay = [Niên_lịch, Thời_gian].filter(Boolean).join(' ') || 'Chưa rõ';
        const Địa_điểm = Vị_trí.Địa_điểm || '';
        const Khu_vực = Vị_trí.Khu_vực || '';
        const Đại_lục = Vị_trí.Đại_lục || '';
        const Vị_trí_hiển_thị = Địa_điểm || Khu_vực || Đại_lục || 'Chưa rõ';
        const Vị_trí_đầy_đủ = [Đại_lục, Khu_vực, Địa_điểm].filter(Boolean).join(' > ');
        const Tên = Nhân_vật.Tên || 'Mạo hiểm giả';
        const Cấp_độ = Nhân_vật.Cấp_độ || 1;
        const Nghề_nghiệp = Nhân_vật.Nghề_nghiệp || 'Mạo hiểm giả';
        const Chủng_tộc = Nhân_vật.Chủng_tộc || '';
        const raceStr = Chủng_tộc ? ` · ${Chủng_tộc}` : '';
        const Ảnh_đại_diện_người_chơi = (() => { try { return localStorage.getItem('rpg_player_avatar'); } catch (e) { return ''; } })() || getPresetAvatar(Tên) || '';

        // Cập nhật ảnh nền theo nghề nghiệp (có cache)
        if (Nghề_nghiệp !== _cachedClassName) {
          const bgUrl = getClassBackgroundUrl(Nghề_nghiệp);
          document.documentElement.style.setProperty('--class-bg-url', `url('${bgUrl}')`);
          _cachedClassName = Nghề_nghiệp;
        }

        const Sinh_mệnh_hiện_tại = Nhân_vật.Sinh_mệnh_hiện_tại || 0;
        const Giới_hạn_sinh_mệnh = Nhân_vật.Giới_hạn_sinh_mệnh || 1;
        const Sinh_mệnh_tạm_thời = Nhân_vật.Sinh_mệnh_tạm_thời || 0;
        const hpPct = Math.min(100, Math.max(0, (Sinh_mệnh_hiện_tại / Giới_hạn_sinh_mệnh) * 100));
        const shieldPct = Sinh_mệnh_tạm_thời > 0 ? Math.min(100 - hpPct, (Sinh_mệnh_tạm_thời / Giới_hạn_sinh_mệnh) * 100) : 0;
        const CP = Nhân_vật.CP || 0;
        const AC = Nhân_vật.AC || 10;
        const Kinh_nghiệm_hiện_tại = Nhân_vật.Tổng_kinh_nghiệm_hiện_tại || 0;
        const Ngưỡng_lên_cấp = Nhân_vật.Ngưỡng_lên_cấp || 100;
        // Thanh tiến độ: ưu tiên tính bằng kinh nghiệm ròng trong cấp, dữ liệu bất thường thì fallback
        const _calcTh = (lv) => { let t = 0; for (let L = 1; L < lv; L++) t += Math.floor(100 * Math.pow(L, 1.5)); return t; };
        const Ngưỡng_cấp_trước = _calcTh(Nhân_vật.Cấp_độ || 1);
        const Kinh_nghiệm_cần_trong_cấp = Ngưỡng_lên_cấp - Ngưỡng_cấp_trước;
        const Kinh_nghiệm_đã_có_trong_cấp = Kinh_nghiệm_hiện_tại - Ngưỡng_cấp_trước;
        const expPct = (Kinh_nghiệm_cần_trong_cấp > 0 && Kinh_nghiệm_đã_có_trong_cấp >= 0)
          ? Math.min(100, Math.max(0, (Kinh_nghiệm_đã_có_trong_cấp / Kinh_nghiệm_cần_trong_cấp) * 100))
          : Math.min(100, Math.max(0, (Kinh_nghiệm_hiện_tại / Ngưỡng_lên_cấp) * 100));
        // Render buff
        let buffHTML = '';
        Object.entries(Hiệu_ứng_trạng_thái).forEach(([name, effect]) => {
          const isDebuff = effect.Loại === 'DEBUFF';
          const iconClass = getBuffIcon(name, isDebuff);
          const typeClass = isDebuff ? 'is-debuff' : 'is-buff';
          const duration = effect.Thời_lượng || '∞';
          const shortDur = duration === 'Vĩnh viễn' ? '∞' : duration.toString().replace('hiệp', 't');
          const desc = effect.Mô_tả || '';
          buffHTML += `<div class="buff-icon-item ${typeClass}" data-buff-name="${name}">
            <i class="${iconClass}"></i>
            <div class="buff-duration-badge">${shortDur}</div>
            <div class="buff-tooltip">
              <span class="buff-tooltip-name">${name}</span>
              <span class="buff-tooltip-desc">${desc}</span>
            </div>
          </div>`;
        });
        // Render ô kỹ năng
        const Ô_kỹ_năng_chủ_động = Nhân_vật.Ô_kỹ_năng_chủ_động || {};
        const Ô_kỹ_năng_thức_tỉnh = Nhân_vật.Ô_kỹ_năng_thức_tỉnh || {};
        const slotConfig = getSkillSlotConfig(data);
        const skillSystemMode = slotConfig.mode;
        const comboPlan = skillSystemMode === 'combo' ? getComboSlotPlan(data) : null;
        const mainSlotCount = slotConfig.main;
        const awakeningSlotCount = slotConfig.awakening;

        const renderSlots = (slotSource, maxSlots, isAwk, options = {}) => {
          const entries = Array.isArray(slotSource) ? slotSource : Object.entries(slotSource);
          const slotType = Object.prototype.hasOwnProperty.call(options, 'slotType')
            ? options.slotType
            : (isAwk ? 'Ô_kỹ_năng_thức_tỉnh' : 'Ô_kỹ_năng_chủ_động');
          const disablePicker = options.disablePicker === true;
          const wrapperClassName = typeof options.wrapperClassName === 'function'
            ? options.wrapperClassName
            : (() => options.wrapperClassName || '');
          const slotClassName = typeof options.slotClassName === 'function'
            ? options.slotClassName
            : (() => options.slotClassName || '');
          const slotMetaFactory = typeof options.slotMetaFactory === 'function'
            ? options.slotMetaFactory
            : (() => null);
          const markerHtmlFactory = typeof options.markerHtmlFactory === 'function'
            ? options.markerHtmlFactory
            : (() => '');
          // Tiến độ hồi chiêu: đọc Bộ_đếm_hồi_chiêu từ Cây_kỹ_năng
          const TIER_CD = { 'Nâng_cao': 1, 'Tất_sát': 2, 'Áo_nghĩa': 3, 'Thức_tỉnh_một': 3, 'Thức_tỉnh_hai': 4, 'Thức_tỉnh_ba': 5 };
          let html = '';
          for (let i = 0; i < maxSlots; i++) {
            const entry = entries[i];
            const wrapperExtraClass = wrapperClassName(i, entry);
            const slotExtraClass = slotClassName(i, entry);
            const wrapperClassAttr = `skill-slot-wrapper${wrapperExtraClass ? ` ${wrapperExtraClass}` : ''}`;
            const slotMeta = slotMetaFactory(i, entry);
            const slotMetaAttr = slotMeta ? (" data-slot-meta='" + encodeSlotMeta(slotMeta) + "'") : '';
            const markerHtml = markerHtmlFactory(i, entry, slotMeta);
            if (entry) {
              const [sName, skill] = entry;
              const fullSkill = Danh_sách_kỹ_năng[sName] || skill;
              const type = fullSkill.Loại || 'Chủ_động';
              const tier = fullSkill.Bậc_kỹ_năng || (isAwk ? 'Thức_tỉnh_một' : 'Cơ_bản');
              const iconSvg = getSkillSvg(type, tier);
              const lv = skill.Cấp_kỹ_năng || fullSkill.Cấp_hiện_tại || 1;
              const isCooling = skill.Đang_hồi_chiêu === true;

          </div>` : ''}
        </div>`;
      };

      // ==================== Khởi tạo & sự kiện ====================
      const app = document.getElementById('app');
      let _cachedData = null;
      let _normalizingUiText = false;
      const normalizeVisibleUiText = (root = document.body) => {
        if (_normalizingUiText) return;
        _normalizingUiText = true;
        try {
          normalizeUiUnderscores(root);
        } finally {
          _normalizingUiText = false;
        }
      };
      const uiTextObserver = new MutationObserver((mutations) => {
        if (_normalizingUiText) return;
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach((node) => {
            if (node.nodeType === Node.TEXT_NODE && node.nodeValue.includes('_')) {
              node.nodeValue = node.nodeValue.replace(/_/g, ' ');
            } else if (node.nodeType === Node.ELEMENT_NODE) {
              normalizeVisibleUiText(node);
            }
          });
        });
      });
      uiTextObserver.observe(document.body, { childList: true, subtree: true });

      const bindEvents = () => {
        // Bấm thông tin thế giới để xem toàn văn, dùng fixed để không bị vùng overflow cắt mất.
        let _worldTip = null;
        const removeWorldTip = () => {
          if (_worldTip) { _worldTip.remove(); _worldTip = null; }
        };
        document.querySelectorAll('.world-info-row[data-full]').forEach(row => {
          row.addEventListener('click', function (e) {
            e.stopPropagation();
            if (_worldTip && _worldTip._src === this) { removeWorldTip(); return; }
            removeWorldTip();
            const rect = this.getBoundingClientRect();
            const tip = document.createElement('div');
            tip.className = 'world-info-tip-fixed';
            tip.textContent = this.dataset.full;
            tip._src = this;
            document.body.appendChild(tip);
            _worldTip = tip;
            // Render trước để lấy kích thước tooltip.
            const tipW = tip.offsetWidth;
            const vw = window.innerWidth;
            let left = rect.left;
            let arrowLeft = 12;
            // Nếu tràn mép phải thì đẩy tooltip sang trái.
            if (left + tipW > vw - 8) {
              const shift = left + tipW - (vw - 8);
              left -= shift;
              arrowLeft = Math.min(Math.max(rect.left - left + rect.width / 2 - 5, 8), tipW - 16);

            const name = this.dataset.assetName;
            const wasExpanded = card.classList.contains('expanded');
            document.querySelectorAll('.asset-card.expanded').forEach(c => c.classList.remove('expanded'));
            if (!wasExpanded) {
              card.classList.add('expanded');
              _activeBusinessAsset = name;
            } else {
              _activeBusinessAsset = null;
            }
          });
        });
        document.querySelectorAll('.asset-rename-btn[data-rename-asset]').forEach(el => {
          el.addEventListener('click', function (e) {
            e.stopPropagation();
            const name = this.dataset.renameAsset;
            if (name) window.renameBusinessAsset(name);
          });
        });
        document.querySelectorAll('.biz-sub-tab[data-asset-name][data-target]').forEach(el => {
          el.addEventListener('click', function (e) {
            e.stopPropagation();
            const assetName = this.dataset.assetName;
            const target = this.dataset.target || 'build';
            _activeBusinessSubTabs[assetName] = target;
            const card = this.closest('.asset-card');
            if (!card) return;
            card.querySelectorAll('.biz-sub-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            card.querySelectorAll('.biz-sub-pane').forEach(p => p.classList.remove('active'));
            const pane = card.querySelector(`.biz-sub-pane[data-pane="${target}"]`);
            if (pane) pane.classList.add('active');
          });
        });
        document.querySelectorAll('.todo-handle-btn[data-asset-name][data-asset-location][data-todo-name]').forEach(el => {
          el.addEventListener('click', function (e) {
            e.stopPropagation();
            const assetName = this.dataset.assetName || 'tài sản này';
            const assetLocation = this.dataset.assetLocation || 'Địa điểm chưa biết';
            const todoName = this.dataset.todoName || '';
            if (!todoName) return;

            showBattleConfirm('Có muốn đi xử lý việc chờ xử lý này không?', { title: 'Đi xử lý', okText: 'Xác nhận đi', cancelText: 'Nghĩ lại' })
              .then((confirmed) => {
                if (!confirmed) return;
                const text = `Đi tới ${assetLocation}, đến ${assetName} để xử lý ${todoName}`;
                const ok = sendMessageToChat(text);
                if (!ok) showBattleWarning('Gửi thất bại: không tìm thấy khung nhập chat');
              });
          });
        });
        document.querySelectorAll('.mythic-unlock-btn').forEach(el => {
          el.addEventListener('click', function (e) {
            e.stopPropagation();
            const message = this.dataset.mythicMessage || '';
            const confirmText = this.dataset.mythicConfirm || 'Xác nhận đi tới đó?';
            const title = this.dataset.mythicTitle || 'Đi tới';
            if (!message) return;
            showBattleConfirm(confirmText, { title, okText: 'Xác nhận đi', cancelText: 'Nghĩ lại', variant: 'neutral' })
              .then((confirmed) => {
                if (!confirmed) return;
                const ok = sendMessageToChat(message);
                if (!ok) showBattleWarning('Gửi thất bại: không tìm thấy khung nhập chat');
              });
          });
        });
      };
      let _activeTab = 'skills';
      let _activeSkillSubTab = 'combat';
      let _activeRelTab = 'bonds';
      let _activeRumorTab = 'gossip';
      let _activeNearbyPerson = null;
      let _activeBusinessAsset = null;
      let _activeBusinessSubTabs = {};
      const refresh = () => {
        const data = fetchLatestMvuData();
        if (data && Object.keys(data).length > 0) {
          if (data?.Cấu_hình_hệ_thống?.Thế_giới_quan === 'Sword Art Online' && _activeTab === 'map') {
            _activeTab = 'skills';
          }
          // Tự học và trang bị kỹ năng đã mở khóa (không cần mở nút nổi)
          autoLearnAndEquipSkills(data);
          // Dọn cache ảnh đại diện không còn nằm trong danh sách ràng buộc hiện tại.
          cleanBondAvatarCache(new Set(Object.keys(data.Danh_sách_ràng_buộc || {})));
          const json = JSON.stringify(data);
          if (json !== _cachedData) {
            // Lưu tab hiện tại.
            const curTab = document.querySelector('.tab-item.active');
            if (curTab) _activeTab = curTab.dataset.tabId || 'skills';
            const curSkillSubTab = document.querySelector('.skill-sub-tab.active');
            if (curSkillSubTab) _activeSkillSubTab = curSkillSubTab.dataset.skillTab || 'combat';
            const curRelTab = document.querySelector('.rel-sub-tab.active');
            if (curRelTab) _activeRelTab = curRelTab.dataset.relTab || 'bonds';
            const curRumorTab = document.querySelector('.rumor-sub-tab.active');
            if (curRumorTab) _activeRumorTab = curRumorTab.dataset.rumorTab || 'gossip';
            const curNearby = document.querySelector('.nearby-card.active');
            if (curNearby) _activeNearbyPerson = curNearby.dataset.nearbyName;
            else _activeNearbyPerson = null;
            const curBusiness = document.querySelector('.asset-card.expanded[data-asset-name]');
            if (curBusiness) {
              _activeBusinessAsset = curBusiness.dataset.assetName;
              const curBizTab = curBusiness.querySelector('.biz-sub-tab.active[data-target]');
              if (curBizTab && _activeBusinessAsset) {
                _activeBusinessSubTabs[_activeBusinessAsset] = curBizTab.dataset.target || 'build';
              }
            } else {
              _activeBusinessAsset = null;
            }
            _cachedData = json;
            app.innerHTML = renderStatusBar(data);
            // Khôi phục trạng thái tab
            if (_activeTab !== 'skills') {
              document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
              document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
              const btn = document.querySelector(`.tab-item[data-tab-id="${_activeTab}"]`);
              const pane = document.querySelector(`.tab-pane[data-pane="${_activeTab}"]`);
              if (btn) btn.classList.add('active');
              if (pane) pane.classList.add('active');
            }
            // Khôi phục trạng thái tab con kỹ năng
            if (_activeSkillSubTab !== 'combat') {
              document.querySelectorAll('.skill-sub-tab').forEach(t => t.classList.remove('active'));
              document.querySelectorAll('.skill-sub-pane').forEach(p => p.classList.remove('active'));
              const skillSubBtn = document.querySelector(`.skill-sub-tab[data-skill-tab="${_activeSkillSubTab}"]`);
              const skillSubPane = document.querySelector(`.skill-sub-pane[data-skill-pane="${_activeSkillSubTab}"]`);
              if (skillSubBtn) skillSubBtn.classList.add('active');
              if (skillSubPane) skillSubPane.classList.add('active');
            }
            // Khôi phục trạng thái tab con quan hệ
            if (_activeRelTab !== 'bonds') {
              document.querySelectorAll('.rel-sub-tab').forEach(t => t.classList.remove('active'));
              document.querySelectorAll('.rel-pane').forEach(p => p.classList.remove('active'));
              const relBtn = document.querySelector(`.rel-sub-tab[data-rel-tab="${_activeRelTab}"]`);
              const relPane = document.querySelector(`.rel-pane[data-rel-pane="${_activeRelTab}"]`);
              if (relBtn) relBtn.classList.add('active');
              if (relPane) relPane.classList.add('active');
            }
            // Khôi phục trạng thái tab con tin đồn
            if (_activeRumorTab !== 'gossip') {
              document.querySelectorAll('.rumor-sub-tab').forEach(t => t.classList.remove('active'));
              document.querySelectorAll('.rumor-pane').forEach(p => p.classList.remove('active'));
              const rumorBtn = document.querySelector(`.rumor-sub-tab[data-rumor-tab="${_activeRumorTab}"]`);
              const rumorPane = document.querySelector(`.rumor-pane[data-rumor-pane="${_activeRumorTab}"]`);
              if (rumorBtn) rumorBtn.classList.add('active');
              if (rumorPane) rumorPane.classList.add('active');
            }
            // Khôi phục trạng thái chi tiết người ở gần
            if (_activeNearbyPerson) {
              const card = document.querySelector(`.nearby-card[data-nearby-name="${_activeNearbyPerson}"]`);
              if (card) {
                card.classList.add('active');
                const personData = data?.Người_ở_gần?.[_activeNearbyPerson];
                if (personData) renderNearbyDetail(_activeNearbyPerson, personData);
              }
            }
            bindEvents();
            applyAmberMapFrameToDom();
            // Đẩy dữ liệu vị trí sang iframe bản đồ.
            try {
              const Thông_tin_thế_giới = data.Thông_tin_thế_giới || {};
              const Vị_trí = Thông_tin_thế_giới.Vị_trí || {};
              const mapMsg = { type: 'mvu_location', Vị_trí, Thời_gian: Thông_tin_thế_giới.Thời_gian || '', Niên_lịch: Thông_tin_thế_giới.Niên_lịch || '' };
              document.querySelectorAll('iframe').forEach(f => {
                try { f.contentWindow.postMessage(mapMsg, '*'); } catch (e) { }
              });
            } catch (e) { }
          }
        } else {
          if (!_cachedData) app.innerHTML = '<div class="no-data-hint">Đang chờ dữ liệu MVU tải...</div>';
        }
      };

      refresh();
      setInterval(refresh, 3000);
      try {
        const win = getParent();
        if (win.eventSource?.on) win.eventSource.on('mvu_data_updated', refresh);
      } catch (e) { }

      // Lắng nghe yêu cầu sẵn sàng từ iframe bản đồ và đẩy dữ liệu vị trí ngay.
      window.addEventListener('message', (e) => {
        if (e.data && e.data.type === 'map_ready') {
          const data = fetchLatestMvuData();
          const Thông_tin_thế_giới = data.Thông_tin_thế_giới || {};
          const Vị_trí = Thông_tin_thế_giới.Vị_trí || {};
          const mapMsg = { type: 'mvu_location', Vị_trí };
          try { e.source.postMessage(mapMsg, '*'); } catch (err) { }
        }
      });
    })();
  </script>
</body>
